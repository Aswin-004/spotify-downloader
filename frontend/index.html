<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎧 Spotify Downloader</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎧 Spotify Downloader</h1>
            <p>Download tracks and albums with clean naming</p>
        </div>

        <div class="card input-card">
            <input 
                type="text" 
                id="spotifyInput" 
                placeholder="Paste Spotify track or album link..." 
                autocomplete="off"
            />
            <button id="fetchBtn">Fetch</button>
        </div>

        <div id="result" class="card result-card hidden"></div>

        <footer class="footer">
            <p>Spotify Meta Downloader &mdash; For personal use only</p>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
